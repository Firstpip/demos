name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble deploy artifact
        run: |
          mkdir -p _site
          cp .nojekyll _site/

          # dist/ → kmong-{id}-demo/ 매핑
          for dir in kmong-*/dist; do
            [ -d "$dir" ] || continue
            project_dir=$(dirname "$dir")
            id=$(echo "$project_dir" | sed 's/kmong-\([0-9]*\).*/\1/')
            cp -r "$dir" "_site/kmong-${id}-demo"
          done

          # project.json들로 index.html 자동 생성
          python3 .github/scripts/generate-index.py _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
